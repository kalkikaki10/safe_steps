<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Assistant – Safe Steps</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">

<!-- INLINE STYLES (HTML ONLY) -->
<style>
  .card {
    max-width: 700px;
  }

  /* Chat box */
  #chatBox {
    width: 100%;
    height: 320px;
    background: #f1f5f9;
    border-radius: 16px;
    padding: 15px;
    overflow-y: auto;
    text-align: left;
    font-size: 16px;
    border: 2px solid #ddd;
  }
/* Stop reading floating button */
  .stop-btn {
    position: fixed;
    bottom: 130px;
    right: 20px;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    font-size: 18px;
    font-weight: bold;
    color: white;
    border: none;
    background: radial-gradient(circle, #ff5252, #c62828);
    box-shadow: 0 12px 30px rgba(198,40,40,0.6);
  }


  /* Input */
  .chat-input {
    width: 100%;
    padding: 18px;
    margin-top: 14px;
    font-size: 18px;
    border-radius: 14px;
    border: 2px solid #ddd;
  }

  /* Buttons */
  .big-btn {
    width: 100%;
    padding: 18px;
    margin-top: 14px;
    font-size: 20px;
    font-weight: 600;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    color: white;
    transition: transform 0.15s ease;
  }

  .big-btn.primary {
    background: linear-gradient(135deg, #0b3c5d, #1fa2a6);
  }

  .big-btn.secondary {
    background: linear-gradient(135deg, #607d8b, #90a4ae);
  }

  .big-btn:active {
    transform: scale(0.97);
  }

  /* SOS */
  .sos-btn {
    width: 95px;
    height: 95px;
    font-size: 22px;
    border-radius: 50%;
    background: radial-gradient(circle, #ff5252, #c62828);
  }
</style>
</head>

<body>

<header class="app-header">
  <h1>AI Assistant</h1>
  <p>Ask questions by typing or speaking</p>
</header>

<main class="card">

  <div id="chatBox"></div>

  <input 
    id="userInput" 
    class="chat-input"
    placeholder="Type your message..."
  >

  <button class="big-btn primary" onclick="sendMessage()">
    📩 Send Message
  </button>

  <button class="big-btn primary" onclick="startVoice()">
    🎤 Speak
  </button>

  <button class="big-btn secondary" onclick="history.back()">
    ⬅ Back
  </button>

</main>
<!-- STOP READING -->
<button class="stop-btn" onclick="stopReading()">🛑</button>

<button class="sos-btn" onclick="sendSOS()">SOS</button>

<script src="js/chatbot.js"></script>
<script src="js/sos.js"></script>

</body>
</html>
