<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register – Safe Steps</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">

<style>
.card{
max-width:450px;
margin-top:60px;
}

.input-field{
width:100%;
padding:14px;
margin-top:15px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

.btn{
width:100%;
padding:15px;
margin-top:20px;
font-size:18px;
border:none;
border-radius:10px;
background:#0b3c5d;
color:white;
cursor:pointer;
}
</style>

</head>

<body>

<header class="app-header">
<h1>Safe Steps</h1>
<p>Create your account</p>
</header>

<main class="card">

<input id="name" class="input-field" placeholder="Full Name">

<input id="email" class="input-field" placeholder="Email or Phone">

<input type="password" id="password" class="input-field" placeholder="Password">

<button class="btn" onclick="registerUser()">Register</button>

<p style="margin-top:15px">
Already have account?
<a href="login.html">Login</a>
</p>

</main>

<script src="js/auth.js"></script>

</body>
</html>
